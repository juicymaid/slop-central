<!DOCTYPE html>
<html lang="" class="dark">

<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slop Central</title>
  
  <!-- Midnight Luxe Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>

<body class="bg-[#0D0D12] text-[#FAF8F5] antialiased selection:bg-[#C9A84C] selection:text-[#0D0D12] relative overflow-x-hidden min-h-screen">
  
  <!-- Global Noise Overlay -->
  <svg class="pointer-events-none fixed inset-0 z-50 h-[100vh] w-[100vw] opacity-[0.05]" xmlns="http://www.w3.org/2000/svg">
    <filter id="noiseFilter">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch" />
    </filter>
    <rect width="100%" height="100%" filter="url(#noiseFilter)" />
  </svg>

  <div id="app" class="relative z-10"></div>
  <script type="module" src="/src/main.js"></script>
  <script async defer src="https://cdnjs.cloudflare.com/ajax/libs/masonry/4.0.0/masonry.pkgd.min.js"></script>
  <script src="/node_modules/masonry-layout/dist/masonry.pkgd.min.js"></script>
</body>

</html>
