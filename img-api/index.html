<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Welcome to the Image API</title>
        <meta name="description" content="Welcome page for the Image API. View the documentation to get started." />
        <style>
            :root {
                --bg: #0f172a;
                --card: #111827;
                --text: #e5e7eb;
                --muted: #9ca3af;
                --primary: #22c55e;
                --primary-ink: #052e16;
                --focus: 2px solid #22c55e99;
            }
            * { box-sizing: border-box; }
            html, body { height: 100%; }
            body {
                margin: 0;
                font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, Apple Color Emoji, Segoe UI Emoji;
                background: radial-gradient(1200px 800px at 20% -10%, #1f2937, transparent 60%),
                                        radial-gradient(900px 600px at 100% 120%, #0a0f1f, transparent 50%),
                                        var(--bg);
                color: var(--text);
                display: grid;
                place-items: center;
                padding: 2rem;
            }
            main {
                width: 100%;
                max-width: 640px;
                background: linear-gradient(180deg, #0b1220, #0a0f1a);
                border: 1px solid #1f2937;
                border-radius: 16px;
                padding: 2.25rem;
                box-shadow: 0 10px 30px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.03);
                text-align: center;
            }
            h1 {
                margin: 0 0 .5rem;
                font-size: clamp(1.75rem, 2vw + 1rem, 2.25rem);
                letter-spacing: .2px;
            }
            p {
                margin: 0 0 1.5rem;
                color: var(--muted);
                line-height: 1.6;
            }
            .actions { display: flex; justify-content: center; gap: .75rem; flex-wrap: wrap; }
            .btn {
                appearance: none;
                border: 0;
                background: var(--primary);
                color: var(--primary-ink);
                padding: .8rem 1.15rem;
                font-weight: 700;
                border-radius: 10px;
                text-decoration: none;
                display: inline-flex;
                align-items: center;
                gap: .5rem;
                box-shadow: 0 8px 20px rgba(34,197,94,.25);
                transition: transform .08s ease, box-shadow .2s ease, background .2s ease, opacity .2s ease;
            }
            .btn:hover { transform: translateY(-1px); box-shadow: 0 10px 24px rgba(34,197,94,.32); }
            .btn:active { transform: translateY(0); box-shadow: 0 6px 16px rgba(34,197,94,.22); }
            .btn:focus-visible { outline: var(--focus); outline-offset: 3px; }
            .btn.secondary {
                background: transparent;
                color: var(--text);
                border: 1px solid #334155;
                box-shadow: none;
            }
            footer {
                margin-top: 1.5rem;
                font-size: .85rem;
                color: #94a3b8;
            }
            code {
                background: #0b1220;
                border: 1px solid #1f2937;
                padding: .15rem .35rem;
                border-radius: 6px;
                font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
                font-size: .9em;
                color: #d1fae5;
            }
        </style>
    </head>
    <body>
        <main role="main" aria-labelledby="title">
            <h1 id="title">Welcome to the Image API</h1>
            <p>Find endpoints, examples, and usage details in the documentation.</p>
            <div class="actions">
                <a class="btn" href="/docs" aria-label="View API documentation">View Documentation</a>
            </div>
            <footer>
                GET started at <code>/docs</code>
            </footer>
        </main>
    </body>
</html>
